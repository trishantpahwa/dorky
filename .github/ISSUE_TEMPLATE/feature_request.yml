name: Feature request
description: Suggest an idea for dorky
title: "[Feature]: "
labels: ["enhancement"]
body:
  - type: markdown
    attributes:
      value: |
        Describe the problem and the feature that would help.
  - type: textarea
    id: problem
    attributes:
      label: Problem
      description: What is hard or missing today?
    validations:
      required: true
  - type: textarea
    id: solution
    attributes:
      label: Proposed solution
      description: How should it work?
    validations:
      required: true
  - type: textarea
    id: alternatives
    attributes:
      label: Alternatives considered
      description: Optional
    validations:
      required: false
