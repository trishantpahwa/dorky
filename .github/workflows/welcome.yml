name: Welcome First-time Contributors

on:
    issues:
        types: [opened]
    pull_request:
        types: [opened]

permissions:
    issues: write
    pull-requests: write
    contents: read

jobs:
    welcome:
        runs-on: ubuntu-latest
        timeout-minutes: 5
        if: github.event.sender.type != 'Bot'

        steps:
            - name: Check and welcome contributor
              uses: actions/github-script@v7
              with:
                  github-token: ${{ secrets.GITHUB_TOKEN }}
                  script: |
                      const path = '.github/templates/messages.cjs';
                      const { data: file } = await github.rest.repos.getContent({
                        owner: context.repo.owner,
                        repo: context.repo.repo,
                        path,
                        ref: context.sha
                      });

                      const content = Buffer.from(file.content, 'base64').toString('utf8');
                      const module = { exports: {} };
                      const vm = require('vm');
                      vm.runInNewContext(content, { module, exports: module.exports });
                      const templates = module.exports.welcome;

                      const isPR = !!context.payload.pull_request;
                      const issueNumber = isPR ? context.payload.pull_request.number : context.payload.issue.number;
                      const commenter = context.payload.sender.login;

                      // Check if this is the user's first issue/PR in the repo
                      const { data: userIssues } = await github.rest.issues.listForRepo({
                        owner: context.repo.owner,
                        repo: context.repo.repo,
                        creator: commenter,
                        state: 'all',
                        per_page: 2 // We only need to know if they have more than 1
                      });

                      const isFirstContribution = userIssues.length === 1;

                      if (isFirstContribution) {
                        const t = isPR ? templates.firstPR : templates.firstIssue;
                        
                        function fillTemplate(str, vars) {
                          return Object.entries(vars).reduce((acc, [key, value]) => {
                            return acc.replaceAll(`{${key}}`, String(value)).replaceAll(`@{${key}}`, `@${value}`);
                          }, str);
                        }

                        const body = `${fillTemplate(t.greeting, { commenter })}\n\n${fillTemplate(t.body, { commenter })}\n\n${fillTemplate(t.nextSteps, { commenter })}\n\n${fillTemplate(t.encouragement, { commenter })}`;

                        const reply = await github.rest.issues.createComment({
                          owner: context.repo.owner,
                          repo: context.repo.repo,
                          issue_number: issueNumber,
                          body
                        });

                        const reactionPool = ['+1', 'hooray', 'heart', 'rocket'];
                        for (const content of reactionPool) {
                          try {
                            await github.rest.reactions.createForIssueComment({
                              owner: context.repo.owner,
                              repo: context.repo.repo,
                              comment_id: reply.data.id,
                              content
                            });
                          } catch (e) {
                            console.log(`Reaction ${content} failed: ${e.message}`);
                          }
                        }

                        console.log(`Welcomed @${commenter} for their first contribution to issue #${issueNumber}`);
                      }
